# Continuous Deployment: builds and publishes the site to GitHub Pages.
name: Deploy GitHub Pages

on:
  # Allow manual trigger from the Actions UI.
  workflow_dispatch:
  # Automatically deploy latest main branch changes.
  push:
    branches:
      - main

# Required permissions for GitHub Pages OIDC deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Keep only the latest in-progress deployment for this workflow.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Build static assets and package them for Pages.
  build:
    runs-on: ubuntu-latest
    env:
      # Set Vite base path to repository name for project pages routing.
      VITE_BASE_PATH: /${{ github.event.repository.name }}/

    steps:
      # Pull repository code into the runner workspace.
      - name: Checkout
        uses: actions/checkout@v4

      # Install Node and enable npm dependency cache for faster runs.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Install exact dependency versions defined in lockfile.
      - name: Install dependencies
        run: npm ci

      # Build production-ready static files into dist/.
      - name: Build app
        run: npm run build

      # Upload dist/ as artifact consumed by the deploy job.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # Publish uploaded artifact to the GitHub Pages environment.
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # Trigger actual Pages release.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
